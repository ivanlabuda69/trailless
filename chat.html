            .mobile-chats-list { flex: 1; overflow-y: auto; padding: 8px 0; }

            .mobile-chat-name { font-weight: 500; font-size: 1rem; }
            .mobile-chat-preview { font-size: 0.75rem; color: #6e7681; }
            .mobile-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
            .mobile-input-area { padding: 10px 12px; border-top: 0.5px solid #30363d; background: #161b22; display: flex; gap: 8px; flex-shrink: 0; }

            .mobile-send { background: #2f81f7; border: none; width: 42px; height: 42px; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

            .admin-badge, .tester-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 20px; }

        }
        @media (min-width: 769px) { .mobile-layout { display: none; } }
    </style>
</head>
<body>
    <!-- ДЕСКТОП (старый интерфейс) -->
    <div class="desktop-layout" id="desktopLayout">
        <div class="menu-bar">
            <div class="menu-icon" id="newChatBtnDesktop"><span class="icon icon-plus"></span></div>
            <div class="menu-icon" id="adminBtnDesktop" style="display: none;"><span class="icon icon-admin"></span></div>
            <div class="menu-icon" id="homeBtnDesktop"><span class="icon icon-home"></span></div>
            <div class="menu-icon" id="settingsBtnDesktop"><span class="icon icon-settings"></span></div>
        </div>
        <div class="sidebar" id="sidebarDesktop">
            <div class="sidebar-header"><div class="user-info"><div class="user-name"><span id="userNameTextDesktop">Загрузка...</span><span id="userBadgeDesktop"></span></div><div class="user-email" id="userEmailDesktop"></div></div><div id="changePasswordWarningDesktop" class="warning-banner" style="display: none;">⚠️ Стандартный пароль! Смените.</div><button id="logoutBtnDesktop" class="logout-btn"><span class="icon icon-logout"></span> Выйти</button></div>
            <button id="newChatSidebarBtnDesktop" class="new-chat-btn"><span class="icon icon-plus"></span> Новый чат</button>
            <div class="chats-list" id="chatsListDesktop"></div>
        </div>
        <div class="chat-main"><div class="chat-panel" id="chatPanelDesktop"><div class="chat-header"><div class="chat-title" id="chatTitleDesktop">Выберите чат</div></div><div class="messages" id="messagesListDesktop"><div class="empty-state">Нажмите + чтобы начать новый чат</div></div><div class="message-input-area" id="messageAreaDesktop" style="display: none;"><input type="text" id="messageInputDesktop" class="message-input" placeholder="Введите сообщение..."><button id="sendBtnDesktop" class="send-btn"><span class="icon icon-send"></span> Отправить</button></div></div><div class="home-panel" id="homePanelDesktop"><h2>Trailless</h2><p style="color:#8b949e;">Мгновенный чат без следа</p><button id="returnToChatBtnDesktop" class="return-btn"><span class="icon icon-arrow-back"></span> Вернуться в чат</button></div></div>
    </div>

    <!-- МОБИЛЬНЫЙ ИНТЕРФЕЙС (Telegram-style) -->
    <div class="mobile-layout" id="mobileLayout">
        <div class="mobile-chats-screen" id="mobileChatsScreen">
            <div class="mobile-header"><div class="mobile-header-title">📩 Trailless</div><div class="mobile-new-chat" id="mobileNewChatBtn"><span class="icon icon-plus" style="width:18px;height:18px;"></span></div></div>
            <div class="mobile-user-row"><div class="mobile-user-info"><div class="mobile-username" id="mobileUserName">Загрузка...</div><div class="mobile-useremail" id="mobileUserEmail"></div></div><button class="mobile-logout-btn" id="mobileLogoutBtn">Выйти</button></div>
            <div id="mobileChangePwdWarning" class="warning-banner-mobile" style="display: none;">⚠️ Стандартный пароль! Смените в настройках.</div>
            <div class="mobile-chats-list" id="mobileChatsList"><div class="mobile-empty">Нет чатов. Нажмите +</div></div>
        </div>
        <div class="mobile-chat-screen" id="mobileChatScreen"><div class="mobile-header"><div class="mobile-back-btn" id="mobileBackBtn"><span class="icon icon-arrow-back" style="width:18px;height:18px;"></span></div><div class="mobile-header-title" id="mobileChatTitle">Чат</div><div style="width:32px;"></div></div><div class="mobile-messages" id="mobileMessagesList"><div class="mobile-empty">Выберите чат</div></div><div class="mobile-input-area"><input type="text" id="mobileMessageInput" class="mobile-input" placeholder="Сообщение..."><button id="mobileSendBtn" class="mobile-send"><span class="icon icon-send" style="width:18px;height:18px;"></span></button></div></div>
    </div>

    <!-- Модальные окна (общие) -->
    <div id="settingsModal" class="modal hidden"><div class="modal-content"><h3>Настройки</h3><div class="settings-group"><label>Размер шрифта</label><select id="fontSizeSelect"><option value="small">Маленький</option><option value="medium" selected>Средний</option><option value="large">Большой</option></select></div><div class="settings-group"><label>Сменить username</label><input type="text" id="newUsername" placeholder="5-15 символов"><button id="changeUsernameBtn">Сменить</button></div><div class="settings-group"><label>Сменить пароль</label><input type="password" id="currentPassword" placeholder="Текущий"><input type="password" id="newPassword" placeholder="Новый (мин 6)"><input type="password" id="confirmPassword" placeholder="Повторите"><button id="changePasswordBtn">Сменить</button></div><button id="closeSettingsBtn">Закрыть</button></div></div>
    <div id="newChatModal" class="modal hidden"><div class="modal-content"><h3>Новый чат</h3><input type="text" id="chatUsernameInput" placeholder="Username собеседника"><button id="createChatBtn">Начать</button><button id="cancelChatBtn">Отмена</button></div></div>
    <div id="adminPanel" class="admin-panel hidden"><h3>Админ панель</h3><div id="adminUsersList"></div><button id="closeAdminBtn">Закрыть</button></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD7c2eq_Z9v_XjxSafPYJuBV3kDa82Eg9w", authDomain: "trailless-chat.firebaseapp.com", databaseURL: "https://trailless-chat-default-rtdb.europe-west1.firebasedatabase.app", projectId: "trailless-chat", storageBucket: "trailless-chat.firebasestorage.app", messagingSenderId: "175122288335", appId: "1:175122288335:web:f68cb31bb12631cc6ff1ba" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        let currentUser = null, currentUserData = null, currentChatId = null, currentChatOtherId = null, chats = [], messagesUnsubscribe = null, allUsersCache = null;

        function validateUsername(u) { return /^[a-zA-Z0-9]{5,15}$/.test(u); }
        function setFontSize(s) { let f = s==='small'?'12px':s==='medium'?'14px':'16px'; document.body.style.fontSize = f; localStorage.setItem('trailless_font_size', s); }
        function loadFontSize() { let s = localStorage.getItem('trailless_font_size'); if(s){ document.getElementById('fontSizeSelect').value = s; setFontSize(s); } }

        async function loadAllUsers() { let snap = await db.ref('users').once('value'); let users = snap.val()||{}; allUsersCache = Object.entries(users).map(([uid,d])=>({uid, username:(d.username||'').toLowerCase(), email:d.email, banned:d.banned, role:d.role})); }
        async function findUserByUsername(u) { if(!allUsersCache) await loadAllUsers(); return allUsersCache.find(x=>x.username === u.toLowerCase()); }

        function escapeHtml(s) { return s?.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]))||''; }

        async function loadChats() {
            let snap = await db.ref(`users/${currentUser.uid}/chats`).once('value'), data = snap.val()||{}, newChats = [];
            for(let [cid,info] of Object.entries(data)){ let other = await db.ref(`users/${info.with}`).once('value'), otherData = other.val(); let last = await db.ref(`messages/${cid}`).orderByKey().limitToLast(1).once('value'); let lastMsg=''; last.forEach(m=>lastMsg=m.val().text); newChats.push({id:cid, name:otherData?.username||'Unknown', userId:info.with, lastMessage:lastMsg||'Нет сообщений'}); }
            chats = newChats; renderChatsDesktop(); renderChatsMobile();
        }
        function renderChatsDesktop() { let container = document.getElementById('chatsListDesktop'); if(!container) return; container.innerHTML = chats.map(c=>`<div class="chat-item ${currentChatId===c.id?'active':''}" data-id="${c.id}" data-name="${escapeHtml(c.name)}" data-uid="${c.userId}"><div class="chat-name">@${escapeHtml(c.name)}</div><div class="chat-preview">${escapeHtml(c.lastMessage.slice(0,40))}</div></div>`).join('')||'<div style="padding:1rem;text-align:center;">Нет чатов</div>'; document.querySelectorAll('#chatsListDesktop .chat-item').forEach(el=>{ el.onclick = ()=>openChat(el.dataset.id, el.dataset.name, el.dataset.uid); }); }
        function renderChatsMobile() { let container = document.getElementById('mobileChatsList'); if(!container) return; container.innerHTML = chats.map(c=>`<div class="mobile-chat-item" data-id="${c.id}" data-name="${escapeHtml(c.name)}" data-uid="${c.userId}"><div class="mobile-chat-name">@${escapeHtml(c.name)}</div><div class="mobile-chat-preview">${escapeHtml(c.lastMessage.slice(0,40))}</div></div>`).join('')||'<div class="mobile-empty">Нет чатов. Нажмите +</div>'; document.querySelectorAll('#mobileChatsList .mobile-chat-item').forEach(el=>{ el.onclick = ()=>{ openChatMobile(el.dataset.id, el.dataset.name, el.dataset.uid); }; }); }

        function detachMessages() { if(messagesUnsubscribe && currentChatId) db.ref(`messages/${currentChatId}`).off('child_added', messagesUnsubscribe); }
        function addMessageToUI(msg, msgId, isMobile=false) { let container = isMobile?document.getElementById('mobileMessagesList'):document.getElementById('messagesListDesktop'); if(!container) return; if(container.querySelector('.empty-state') && container.children.length===1) container.innerHTML=''; let div = document.createElement('div'); let isOut = msg.senderId === currentUser.uid; div.className = `message ${isOut?'outgoing':'incoming'}`; let time = new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); let badge = msg.senderRole==='admin'?'<span class="admin-badge" style="font-size:0.6rem;">Admin</span>':(msg.senderRole==='tester'?'<span class="tester-badge">Tester</span>':''); div.innerHTML = `<div class="message-sender">${escapeHtml(msg.senderName)} ${badge} ${isOut?'(вы)':''}</div><div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${time}</div>`; container.appendChild(div); container.scrollTop = container.scrollHeight; }

        async function openChat(chatId, otherName, otherUid) { detachMessages(); currentChatId=chatId; currentChatOtherId=otherUid; document.getElementById('chatTitleDesktop').innerHTML = `@${escapeHtml(otherName)}`; document.getElementById('messageAreaDesktop').style.display='flex'; let container = document.getElementById('messagesListDesktop'); container.innerHTML = '<div class="empty-state">Загрузка...</div>'; let snap = await db.ref(`messages/${chatId}`).once('value'); let msgs = snap.val()||{}; container.innerHTML=''; Object.values(msgs).sort((a,b)=>a.timestamp-b.timestamp).forEach(m=>addMessageToUI(m, null, false)); if(Object.keys(msgs).length===0) container.innerHTML='<div class="empty-state">Нет сообщений</div>'; messagesUnsubscribe = db.ref(`messages/${chatId}`).on('child_added', (s)=>{ addMessageToUI(s.val(), s.key, false); }); renderChatsDesktop(); setTimeout(()=>container.scrollTop=container.scrollHeight,100); }
        async function openChatMobile(chatId, otherName, otherUid) { detachMessages(); currentChatId=chatId; currentChatOtherId=otherUid; document.getElementById('mobileChatTitle').innerHTML = `@${escapeHtml(otherName)}`; let container = document.getElementById('mobileMessagesList'); container.innerHTML = '<div class="mobile-empty">Загрузка...</div>'; let snap = await db.ref(`messages/${chatId}`).once('value'); let msgs = snap.val()||{}; container.innerHTML=''; Object.values(msgs).sort((a,b)=>a.timestamp-b.timestamp).forEach(m=>addMessageToUI(m, null, true)); if(Object.keys(msgs).length===0) container.innerHTML='<div class="mobile-empty">Нет сообщений</div>'; messagesUnsubscribe = db.ref(`messages/${chatId}`).on('child_added', (s)=>{ addMessageToUI(s.val(), s.key, true); }); document.getElementById('mobileChatScreen').classList.add('open'); setTimeout(()=>container.scrollTop=container.scrollHeight,100); renderChatsMobile(); }
        async function sendMessageDesktop() { let input = document.getElementById('messageInputDesktop'), text = input.value.trim(); if(!text||!currentChatId) return; let msg = {text, senderId:currentUser.uid, senderName:currentUserData?.username, senderRole:currentUserData?.role||'user', timestamp:Date.now()}; await db.ref(`messages/${currentChatId}`).push(msg); let chat = chats.find(c=>c.id===currentChatId); if(chat) chat.lastMessage=text; renderChatsDesktop(); input.value=''; input.focus(); }
        async function sendMessageMobile() { let input = document.getElementById('mobileMessageInput'), text = input.value.trim(); if(!text||!currentChatId) return; let msg = {text, senderId:currentUser.uid, senderName:currentUserData?.username, senderRole:currentUserData?.role||'user', timestamp:Date.now()}; await db.ref(`messages/${currentChatId}`).push(msg); let chat = chats.find(c=>c.id===currentChatId); if(chat) chat.lastMessage=text; renderChatsMobile(); input.value=''; }
        async function createNewChat() { let username = document.getElementById('chatUsernameInput').value.trim(); if(!username){alert('Введите username');return;} let found = await findUserByUsername(username); if(!found){alert('Не найден');return;} if(found.uid===currentUser.uid){alert('Сам с собой нельзя');return;} if(found.banned){alert('Заблокирован');return;} let existing = chats.find(c=>c.userId===found.uid); if(existing){ openChat(existing.id, existing.name, existing.userId); if(window.innerWidth<=768) openChatMobile(existing.id, existing.name, existing.userId); document.getElementById('newChatModal').classList.add('hidden'); document.getElementById('chatUsernameInput').value=''; return; } let chatId = Date.now().toString(); await db.ref(`users/${currentUser.uid}/chats/${chatId}`).set({with:found.uid, name:found.username, createdAt:Date.now()}); await db.ref(`users/${found.uid}/chats/${chatId}`).set({with:currentUser.uid, name:currentUserData?.username, createdAt:Date.now()}); document.getElementById('newChatModal').classList.add('hidden'); document.getElementById('chatUsernameInput').value=''; await loadChats(); openChat(chatId, found.username, found.uid); if(window.innerWidth<=768) openChatMobile(chatId, found.username, found.uid); }
        async function changeUsername(newU) { newU = newU.toLowerCase(); if(!validateUsername(newU)){alert('5-15 англ/цифры');return false;} let exist = await findUserByUsername(newU); if(exist && exist.uid!==currentUser.uid){alert('Занят');return false;} await db.ref(`usernames/${currentUserData.username}`).remove(); await db.ref(`usernames/${newU}`).set(currentUser.uid); await db.ref(`users/${currentUser.uid}`).update({username:newU}); await currentUser.updateProfile({displayName:newU}); currentUserData.username=newU; document.getElementById('userNameTextDesktop').innerText=newU; document.getElementById('mobileUserName').innerText=newU; await loadAllUsers(); await loadChats(); return true; }
        async function changePassword(oldP,newP,conf){ if(newP!==conf){alert('Пароли не совпадают');return false;} if(newP.length<6){alert('Мин 6 символов');return false;} let cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldP); try{ await currentUser.reauthenticateWithCredential(cred); await currentUser.updatePassword(newP); await db.ref(`users/${currentUser.uid}`).update({defaultPassword:null}); document.getElementById('changePasswordWarningDesktop')?.setAttribute('style','display:none'); document.getElementById('mobileChangePwdWarning')?.setAttribute('style','display:none'); return true; }catch(e){alert('Неверный текущий пароль');return false;} }
        async function logout(){ detachMessages(); await auth.signOut(); window.location.href='login.html'; }

        auth.onAuthStateChanged(async (user)=>{ if(!user){ window.location.href='login.html'; return; } if(!user.emailVerified && !user.providerData.some(p=>p.providerId==='google.com')){ await auth.signOut(); alert('Подтвердите email'); window.location.href='login.html'; return; } currentUser=user; let snap = await db.ref(`users/${user.uid}`).once('value'); currentUserData=snap.val(); if(!currentUserData){ let uname = (user.displayName||user.email.split('@')[0]).toLowerCase(); await db.ref(`users/${user.uid}`).set({email:user.email, username:uname, role:user.email==='imbatop49@gmail.com'?'admin':'user', verified:user.emailVerified, banned:false, hasPassword:true}); await db.ref(`usernames/${uname}`).set(user.uid); currentUserData = (await db.ref(`users/${user.uid}`).once('value')).val(); } if(currentUserData.banned){ await auth.signOut(); alert('Аккаунт заблокирован'); window.location.href='login.html'; return; } document.getElementById('userNameTextDesktop').innerText = currentUserData.username; document.getElementById('userEmailDesktop').innerText = user.email; document.getElementById('mobileUserName').innerText = currentUserData.username; document.getElementById('mobileUserEmail').innerText = user.email; if(currentUserData.defaultPassword==='12345678'){ document.getElementById('changePasswordWarningDesktop').style.display='block'; document.getElementById('mobileChangePwdWarning').style.display='block'; } if(currentUserData.role==='admin'){ document.getElementById('adminBtnDesktop').style.display='flex'; } await loadAllUsers(); await loadChats(); loadFontSize(); });

        // Event listeners
        document.getElementById('newChatBtnDesktop').onclick = ()=>document.getElementById('newChatModal').classList.remove('hidden');
        document.getElementById('newChatSidebarBtnDesktop').onclick = ()=>document.getElementById('newChatModal').classList.remove('hidden');
        document.getElementById('mobileNewChatBtn').onclick = ()=>document.getElementById('newChatModal').classList.remove('hidden');
        document.getElementById('createChatBtn').onclick = createNewChat;
        document.getElementById('cancelChatBtn').onclick = ()=>{document.getElementById('newChatModal').classList.add('hidden'); document.getElementById('chatUsernameInput').value='';};
        document.getElementById('logoutBtnDesktop').onclick = logout;
        document.getElementById('mobileLogoutBtn').onclick = logout;
        document.getElementById('sendBtnDesktop').onclick = sendMessageDesktop;
        document.getElementById('mobileSendBtn').onclick = sendMessageMobile;
        document.getElementById('messageInputDesktop').onkeypress = e=>{if(e.key==='Enter') sendMessageDesktop();};
        document.getElementById('mobileMessageInput').onkeypress = e=>{if(e.key==='Enter') sendMessageMobile();};
        document.getElementById('mobileBackBtn').onclick = ()=>{ document.getElementById('mobileChatScreen').classList.remove('open'); detachMessages(); currentChatId=null; };
        document.getElementById('homeBtnDesktop').onclick = ()=>document.getElementById('homePanelDesktop').classList.add('show');
        document.getElementById('returnToChatBtnDesktop').onclick = ()=>document.getElementById('homePanelDesktop').classList.remove('show');
        document.getElementById('settingsBtnDesktop').onclick = ()=>document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettingsBtn').onclick = ()=>document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('fontSizeSelect').onchange = e=>setFontSize(e.target.value);
        document.getElementById('changeUsernameBtn').onclick = async()=>{ await changeUsername(document.getElementById('newUsername').value.trim()); document.getElementById('newUsername').value=''; alert('Username изменён'); };
        document.getElementById('changePasswordBtn').onclick = async()=>{ let ok = await changePassword(document.getElementById('currentPassword').value, document.getElementById('newPassword').value, document.getElementById('confirmPassword').value); if(ok) alert('Пароль изменён'); };
        document.getElementById('adminBtnDesktop').onclick = async()=>{ if(currentUserData?.role!=='admin')return; let users = (await db.ref('users').once('value')).val()||{}; let container = document.getElementById('adminUsersList'); container.innerHTML = Object.entries(users).map(([uid,d])=>`<div class="admin-user"><div><strong>@${escapeHtml(d.username)}</strong><br>${d.email} ${d.role==='admin'?'<span class="admin-badge">Admin</span>':''}</div><div><button onclick="window.setRoleUser('${uid}','tester')">Тестер</button><button onclick="window.setRoleUser('${uid}','user')">Юзер</button><button onclick="window.toggleBanUser('${uid}',${!d.banned})">${d.banned?'Разбан':'Бан'}</button></div></div>`).join(''); document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('adminPanel').classList.add('open'); };
        document.getElementById('closeAdminBtn').onclick = ()=>{document.getElementById('adminPanel').classList.remove('open'); document.getElementById('adminPanel').classList.add('hidden');};
        window.setRoleUser = async (uid,role)=>{ if(currentUserData?.role!=='admin') return; await db.ref(`users/${uid}`).update({role}); await loadAllUsers(); };
        window.toggleBanUser = async (uid,ban)=>{ if(currentUserData?.role!=='admin') return; await db.ref(`users/${uid}`).update({banned:ban}); await loadAllUsers(); if(ban && uid===currentUser.uid) await logout(); };
    </script>
</body>
</html>
